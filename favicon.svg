<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0800"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6900"/>
      <stop offset="100%" stop-color="#FF4500"/>
    </linearGradient>
    <linearGradient id="grd2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FF6900"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="rgba(255,105,0,0.18)" stroke-width="0.8"/>
  <!-- Shield body -->
  <path d="M16 3.5 L27.5 8 L27.5 17.5 C27.5 24 22.5 29 16 31 C9.5 29 4.5 24 4.5 17.5 L4.5 8 Z" fill="url(#shield)" filter="url(#glow)"/>
  <!-- Shield inner highlight line -->
  <path d="M16 5.8 L25.5 9.8 L25.5 17.5 C25.5 23 21 27.5 16 29 C11 27.5 6.5 23 6.5 17.5 L6.5 9.8 Z" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="0.7"/>
  <!-- Lock icon: body -->
  <rect x="11.5" y="16" width="9" height="7" rx="1.5" fill="white" opacity="0.9"/>
  <!-- Lock arc -->
  <path d="M13 16 L13 13.5 C13 11.5 19 11.5 19 13.5 L19 16" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  <!-- Keyhole dot -->
  <circle cx="16" cy="19.2" r="1.2" fill="url(#grd2)"/>
  <!-- Keyhole stem -->
  <rect x="15.35" y="19.8" width="1.3" height="1.8" rx="0.5" fill="url(#grd2)"/>
</svg>
